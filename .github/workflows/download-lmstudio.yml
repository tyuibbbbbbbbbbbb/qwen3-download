name: Download LM Studio

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/download-lmstudio.yml'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Download LM Studio Windows installer
        run: |
          # Get the install script to find the real URL
          echo "=== Fetching install script ==="
          curl -sL "https://lmstudio.ai/install.ps1" -o install.ps1
          cat install.ps1 | head -50
          
          # Extract download URL from the script
          URL=$(grep -oP 'https://[^"'\'']+\.exe[^"'\'']*' install.ps1 | head -1) || true
          echo "Found URL: $URL"
          
          if [ -n "$URL" ]; then
            wget -q --show-progress -O "LM-Studio-Setup.exe" "$URL"
          else
            # Try common URL patterns
            echo "Trying common patterns..."
            curl -sL "https://lmstudio.ai/download" -o dl_page.html
            URL2=$(grep -oP 'https://[^"]+\.exe[^"]*' dl_page.html | head -1) || true
            echo "Page URL: $URL2"
            if [ -n "$URL2" ]; then
              wget -q --show-progress -O "LM-Studio-Setup.exe" "$URL2"
            else
              # Direct attempt with common patterns
              wget -q --show-progress -O "LM-Studio-Setup.exe" \
                "https://releases.lmstudio.ai/windows/x64/0.4.11+1/LM-Studio-0.4.11+1-Setup.exe" || \
              wget -q --show-progress -O "LM-Studio-Setup.exe" \
                "https://cdn.lmstudio.ai/LM-Studio-0.4.11-Setup.exe" || \
              curl -L -o "LM-Studio-Setup.exe" "https://lmstudio.ai/download/windows"
            fi
          fi
          ls -lh LM-Studio-Setup.exe

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0-lmstudio"
          gh release delete "$TAG" --repo "${{ github.repository }}" -y 2>/dev/null || true
          gh release create "$TAG" \
            --title "LM Studio Windows Installer" \
            --notes "LM Studio installer for Windows" \
            --repo "${{ github.repository }}" \
            LM-Studio-Setup.exe
