name: Download LM Studio

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/download-lmstudio.yml'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Find LM Studio URL via Playwright
        run: |
          pip install playwright
          playwright install chromium

          python3 << 'PYEOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()

                  download_url = None

                  # Intercept download requests
                  async def handle_download(download):
                      nonlocal download_url
                      download_url = download.url
                      print(f"DOWNLOAD URL: {download_url}")
                      path = await download.path()
                      if path:
                          import shutil
                          shutil.copy(path, "LM-Studio-Setup.exe")
                          print(f"Saved to LM-Studio-Setup.exe")

                  page.on("download", handle_download)

                  # Also intercept all requests to find .exe URLs
                  all_urls = []
                  def on_request(request):
                      url = request.url
                      if '.exe' in url or 'download' in url:
                          all_urls.append(url)

                  page.on("request", on_request)

                  print("Navigating to lmstudio.ai/download...")
                  await page.goto("https://lmstudio.ai/download", wait_until="networkidle", timeout=30000)

                  # Look for download button
                  content = await page.content()
                  print(f"Page loaded: {len(content)} bytes")

                  # Try clicking download buttons
                  for selector in [
                      'a:has-text("Download")',
                      'button:has-text("Download")',
                      'a:has-text("Windows")',
                      'a[href*="exe"]',
                      'a[href*="download"]',
                      '[data-platform="windows"]',
                  ]:
                      try:
                          el = page.locator(selector).first
                          if await el.is_visible(timeout=2000):
                              href = await el.get_attribute("href")
                              print(f"Found {selector}: href={href}")
                              if href and ('.exe' in href or 'download' in href.lower()):
                                  download_url = href
                                  break
                      except:
                          pass

                  # Also check Electron updater endpoints
                  import requests
                  for yml_url in [
                      "https://releases.lmstudio.ai/latest.yml",
                      "https://releases.lmstudio.ai/latest-win.yml",
                      "https://releases.lmstudio.ai/win/latest.yml",
                  ]:
                      try:
                          r = requests.get(yml_url, timeout=10)
                          if r.status_code == 200:
                              print(f"\n{yml_url}:")
                              print(r.text[:500])
                      except:
                          pass

                  print(f"\nAll intercepted URLs: {all_urls[:20]}")
                  if download_url:
                      with open("download_url.txt", "w") as f:
                          f.write(download_url)

                  await browser.close()

          asyncio.run(main())
          PYEOF

      - name: Download installer
        run: |
          if [ -f LM-Studio-Setup.exe ]; then
            SIZE=$(stat -c%s LM-Studio-Setup.exe)
            if [ "$SIZE" -gt 1000000 ]; then
              echo "Already downloaded: $(ls -lh LM-Studio-Setup.exe)"
              exit 0
            fi
          fi

          if [ -f download_url.txt ]; then
            URL=$(cat download_url.txt)
            echo "Downloading from: $URL"
            wget -q --show-progress -O LM-Studio-Setup.exe "$URL" || \
              curl -L -o LM-Studio-Setup.exe "$URL"
          fi

          # If still no file, try techspot mirror
          if [ ! -f LM-Studio-Setup.exe ] || [ "$(stat -c%s LM-Studio-Setup.exe 2>/dev/null)" -lt 1000000 ]; then
            echo "Trying alternative sources..."
            # Try direct Electron update URL patterns
            for url in \
              "https://releases.lmstudio.ai/darwin/arm64/0.4.11/latest-mac.yml" \
              "https://releases.lmstudio.ai/win32/x64/latest.yml"; do
              echo "Checking: $url"
              curl -sL "$url" 2>/dev/null | head -20
            done
          fi

          ls -lh LM-Studio-Setup.exe 2>/dev/null || echo "FAILED: No installer downloaded"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0-lmstudio"
          gh release delete "$TAG" --repo "${{ github.repository }}" -y 2>/dev/null || true
          gh release create "$TAG" \
            --title "LM Studio Windows Installer" \
            --notes "LM Studio installer for Windows" \
            --repo "${{ github.repository }}" \
            LM-Studio-Setup.exe
